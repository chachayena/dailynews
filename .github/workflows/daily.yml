name: Daily News Mail

on:
  schedule:
    - cron: '0 23 * * *'   # 한국 시간 매일 8시 실행
  workflow_dispatch:        # 수동 실행 가능

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 메일 발송 실행
        run: python main.py